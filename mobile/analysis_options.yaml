include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    missing_required_param: error
    missing_return: error
    todo: ignore
    dead_code: warning

linter:
  rules:
    - always_declare_return_types
    - avoid_dynamic_calls # Critical for runtime safety
    - avoid_print # No console logs in prod
    - cancel_subscriptions # Prevent memory leaks
    - close_sinks
    - prefer_const_constructors # UI Performance
    - unawaited_futures # Prevent fire-and-forget promise bugs
    - always_put_control_body_on_new_line
    - avoid_empty_else
    - avoid_relative_lib_imports
    - avoid_types_as_parameter_names
    - control_flow_in_finally
    - empty_statements
    - hash_and_equals
    - no_duplicate_case_values
    - prefer_void_to_null
    - throw_in_finally
    - unnecessary_statements
